<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Books</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        /* Content */
        .container {
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .empty {
            text-align: center;
            margin-top: 30px;
            color: #777;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div>
        <a th:href="@{/}">📚 Book Store</a>
    </div>
    <div>
        <a th:href="@{/availableBooks}">Available Books</a>
        <a th:href="@{/myBooks}">My Books</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <h2>❤️ My Book List</h2>

    <!-- If no books -->
    <div class="empty" th:if="${#lists.isEmpty(myBooks)}">
        No books added yet.
    </div>

    <!-- Books Table -->
    <table th:if="${not #lists.isEmpty(myBooks)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Price (₹)</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${myBooks}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.name}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.price}"></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
