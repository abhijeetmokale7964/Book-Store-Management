<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Store</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        /* Background image */
        .bg {
            background-image: url('/images/bk5.AVIF');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        /* Overlay for better readability */
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            height: 100%;
            width: 100%;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(44, 62, 80, 0.9);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .navbar ul li {
            margin-left: 20px;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .navbar ul li a:hover {
            background-color: #1abc9c;
        }

        /* Content */
        .content {
            color: white;
            text-align: center;
            margin-top: 120px;
        }

        .content h1 {
            font-size: 40px;
        }

        .content p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            background: #1abc9c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn:hover {
            background: #16a085;
        }
    </style>
</head>
<body>

<div class="bg">
    <div class="overlay">

        <!-- Navbar -->
        <div class="navbar">
            <div class="logo">📚 BookStore</div>
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/bookRegister}">Add Book</a></li>
                <li><a th:href="@{/availableBooks}">Available Books</a></li>
                <li><a th:href="@{/myBooks}">My Books</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="content">
            <h1>Welcome to Book Store....!!</h1>
            <p>Manage your books easily with Spring Boot & Thymeleaf</p>

            <a th:href="@{/bookRegister}" class="btn">➕ Add Book</a>
            <a th:href="@{/availableBooks}" class="btn">📖 View Books</a>
        </div>

    </div>
</div>

</body>
</html>
