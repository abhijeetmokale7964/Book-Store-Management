<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Books</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        th {
            background: #ff5722;
            color: white;
        }
        .remove {
            background: red;
            color: white;
            padding: 5px 12px;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2>❤️ My Book List</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Author</th>
        <th>Price</th>
        <th>Remove</th>
    </tr>

    <tr th:each="book : ${myBooks}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.name}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.price}"></td>
        <td>
            <a th:href="@{/removeMyBook/{id}(id=${book.id})}"
               class="remove"
               onclick="return confirm('Remove this book from My List?')">
                Remove
            </a>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/availableBooks}">⬅ Back to Books</a>

</body>
</html>
